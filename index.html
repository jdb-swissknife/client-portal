      // Handle SPA redirect from 404.html
      (function() {
        var q = new URLSearchParams(window.location.search);
        var r = q.get('redirect');
        if (r) {
          q.delete('redirect');
          var rest = q.toString();
          window.history.replaceState(null, '', '/client-portal/' + r + (rest ? '?' + rest : ''));

      })();
